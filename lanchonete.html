<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixa Lanchonete - Escola Ideias</title>
    <style>
        /* ==========================================
           ESTILO CSS (Deixa o site bonito)
           ========================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            color: #2d3748;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 20px;
        }

        h1 {
            color: #1a365d;
            font-size: 28px;
            margin-bottom: 5px;
        }

        p.subtitle {
            color: #718096;
            font-size: 14px;
        }

        /* Criar o sistema de duas colunas lado a lado */
        .conteudo {
            display: flex;
            gap: 40px;
        }

        .coluna {
            flex: 1;
        }

        h3 {
            color: #2b6cb0;
            margin-bottom: 15px;
            font-size: 18px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 5px;
        }

        /* Estilo dos botões dos produtos */
        .btn-produto {
            display: block;
            width: 100%;
            padding: 15px;
            margin-bottom: 12px;
            background-color: #ffffff;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            color: #4a5568;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
        }

        .btn-produto:hover {
            border-color: #3182ce;
            background-color: #ebf8ff;
            color: #2b6cb0;
            transform: translateY(-2px);
        }

        /* Lista de itens no resumo */
        #lista-itens {
            list-style: none;
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 20px;
            padding: 10px;
            background: #f7fafc;
            border-radius: 6px;
            border: 1px solid #edf2f7;
        }

        #lista-itens li {
            padding: 6px 0;
            border-bottom: 1px solid #edf2f7;
            font-size: 14px;
        }

        /* Área do Total */
        .caixa-total {
            background-color: #fff5f5;
            border: 1px solid #fed7d7;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
        }

        .caixa-total span {
            display: block;
            font-size: 12px;
            color: #e53e3e;
            font-weight: bold;
            text-transform: uppercase;
        }

        .caixa-total h2 {
            font-size: 32px;
            color: #c53030;
        }

        /* Botões de ação */
        .btn-acao {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 10px;
            transition: background 0.2s;
        }

        .btn-finalizar {
            background-color: #3182ce;
            color: white;
        }

        .btn-finalizar:hover {
            background-color: #2b6cb0;
        }

        .btn-limpar {
            background-color: #e2e8f0;
            color: #4a5568;
        }

        .btn-limpar:hover {
            background-color: #cbd5e0;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>🥪 Caixa da Lanchonete</h1>
            <p class="subtitle">Curso de Informática - Escola Ideias (HTML, CSS & JS)</p>
        </header>

        <div class="conteudo">
            <div class="coluna">
                <h3>📋 Menu de Opções</h3>
                <button class="btn-produto" onclick="adicionarItem('🥟 Coxinha', 2.50)">🥟 Coxinha — 2.50 €</button>
                <button class="btn-produto" onclick="adicionarItem('🍕 Pastel', 3.00)">🍕 Pastel — 3.00 €</button>
                <button class="btn-produto" onclick="adicionarItem('🧃 Sumo Natural', 1.50)">🧃 Sumo Natural — 1.50 €</button>
                <button class="btn-produto" onclick="adicionarItem('🥤 Refrigerante', 2.00)">🥤 Refrigerante — 2.00 €</button>
            </div>

            <div class="coluna">
                <h3>🛒 Resumo do Pedido</h3>
                <ul id="lista-itens">
                    <li id="item-vazio" style="color: #a0aec0; text-align: center; padding: 20px 0;">Nenhum item adicionado.</li>
                </ul>

                <div class="caixa-total">
                    <span>Total a Pagar</span>
                    <h2 id="valor-total">0.00 €</h2>
                </div>

                <button class="btn-acao btn-finalizar" onclick="finalizarVenda()">✅ Finalizar Venda</button>
                <button class="btn-acao btn-limpar" onclick="limparCarrinho()">❌ Limpar Carrinho</button>
            </div>
        </div>
    </div>

    <script>
        let totalConta = 0.0;

        function adicionarItem(nome, preco) {
            // 1. Remover a mensagem de "Nenhum item adicionado" se ela existir
            const itemVazio = document.getElementById("item-vazio");
            if (itemVazio) {
                itemVazio.remove();
            }

            // 2. Adicionar o item visualmente na lista HTML
            const lista = document.getElementById("lista-itens");
            const novoItem = document.createElement("li");
            novoItem.textContent = `${nome} (${preco.toFixed(2)} €)`;
            lista.appendChild(novoItem);

            // 3. Somar o valor ao total e atualizar o ecrã
            totalConta += preco;
            document.getElementById("valor-total").textContent = `${totalConta.toFixed(2)} €`;
        }

        function finalizarVenda() {
            if (totalConta === 0) {
                alert("Erro: Adicione itens ao carrinho antes de finalizar!");
            } else {
                alert(`🎉 Venda concluída com sucesso!\nTotal pago: ${totalConta.toFixed(2)} €\nObrigado!`);
                limparCarrinho();
            }
        }

        function limparCarrinho() {
            totalConta = 0.0;
            document.getElementById("valor-total").textContent = "0.00 €";
            
            // Resetar a lista para o estado original
            document.getElementById("lista-itens").innerHTML = `
                <li id="item-vazio" style="color: #a0aec0; text-align: center; padding: 20px 0;">Nenhum item adicionado.</li>
            `;
        }
    </script>
</body>
</html>
